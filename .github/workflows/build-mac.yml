name: Build macOS

on:
  workflow_dispatch:
    inputs:
      sign:
        description: 'Sign and notarize the build'
        type: boolean
        default: false

jobs:
  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30

    strategy:
      matrix:
        arch: [x64, arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build pipeline (mirrors pack-win.bat steps 1-6) ──

      - name: Build shared package
        run: pnpm build:shared

      - name: Build server (pack)
        run: pnpm build:server:pack

      - name: Prepare server (bytecode + sharp)
        run: pnpm prepare-server

      - name: Build UXP plugin
        run: pnpm build:plugin

      - name: Build CCX package
        run: pnpm build:ccx

      - name: Build Electron app
        run: pnpm build:electron

      # ── Icon conversion ──

      - name: Convert PNG icon to ICNS
        run: |
          ICONDIR=$(mktemp -d)
          mkdir -p "$ICONDIR/icon.iconset"
          for SIZE in 16 32 64 128 256 512; do
            sips -z $SIZE $SIZE icon.png --out "$ICONDIR/icon.iconset/icon_${SIZE}x${SIZE}.png" > /dev/null
            DOUBLE=$((SIZE * 2))
            if [ $DOUBLE -le 1024 ]; then
              sips -z $DOUBLE $DOUBLE icon.png --out "$ICONDIR/icon.iconset/icon_${SIZE}x${SIZE}@2x.png" > /dev/null
            fi
          done
          sips -z 1024 1024 icon.png --out "$ICONDIR/icon.iconset/icon_512x512@2x.png" > /dev/null
          iconutil -c icns "$ICONDIR/icon.iconset" -o apps/electron/resources/icon.icns
          echo "Icon converted successfully"

      # ── Code signing (optional) ──

      - name: Import Apple certificates
        if: ${{ inputs.sign }}
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$MAC_CERTIFICATE_P12" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" -P "$MAC_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          echo "Certificate imported successfully"

      # ── Package ──

      - name: Build macOS PKG
        working-directory: apps/electron
        env:
          # Only set signing env vars if sign is enabled
          CSC_LINK: ${{ inputs.sign && secrets.MAC_CERTIFICATE_P12 || '' }}
          CSC_KEY_PASSWORD: ${{ inputs.sign && secrets.MAC_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ inputs.sign && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ inputs.sign && secrets.APPLE_ID_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ inputs.sign && secrets.APPLE_TEAM_ID || '' }}
        run: |
          if [ "${{ inputs.sign }}" = "false" ]; then
            echo "Building WITHOUT code signing..."
            CSC_IDENTITY_AUTO_DISCOVERY=false npx electron-builder --mac --${{ matrix.arch }}
          else
            echo "Building WITH code signing and notarization..."
            npx electron-builder --mac --${{ matrix.arch }}
          fi

      # ── Upload ──

      - name: Upload PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Retouch-macOS-${{ matrix.arch }}
          path: apps/electron/release/*.pkg
          if-no-files-found: error

      # ── Cleanup ──

      - name: Cleanup keychain
        if: ${{ always() && inputs.sign }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
